services:
  esphome:
    image: ghcr.io/esphome/esphome:2026.6
    container_name: esphome
    restart: unless-stopped
    privileged: true
    network_mode: host
    environment:
      - TZ=Europe/Helsinki
      - ESPHOME_INSTANCE_NAME=ESPHome
      - ESPHOME_DASHBOARD_USE_PING=true
    volumes:
      - ./config:/config
