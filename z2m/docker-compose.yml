services:
  zigbee2mqtt:
    image: ghcr.io/koenkk/zigbee2mqtt:2.10.1
    container_name: zigbee2mqtt
    restart: unless-stopped
    environment:
      - TZ=Europe/Helsinki
      - ZIGBEE2MQTT_DATA=/data
      - ZIGBEE2MQTT_CONFIG_MQTT_SERVER=mqtt://10.0.88.113
      - ZIGBEE2MQTT_CONFIG_MQTT_BASE_TOPIC=zigbee2mqtt
      - ZIGBEE2MQTT_CONFIG_MQTT_USER=${MQTT_USERNAME}
      - ZIGBEE2MQTT_CONFIG_MQTT_PASSWORD=${MQTT_PASSWORD}
      - ZIGBEE2MQTT_CONFIG_ADVANCED_PAN_ID=${Z2M_PAN_ID}
      - ZIGBEE2MQTT_CONFIG_ADVANCED_HOMEASSISTANT_LEGACY_ENTITY_ATTRIBUTES=false
      - ZIGBEE2MQTT_CONFIG_ADVANCED_HOMEASSISTANT_LEGACY_TRIGGERS=false
      - ZIGBEE2MQTT_CONFIG_ADVANCED_LAST_SEEN=ISO_8601_local
      - ZIGBEE2MQTT_CONFIG_ADVANCED_LEGACY_API=false
      - ZIGBEE2MQTT_CONFIG_ADVANCED_LEGACY_AVAILABILITY_PAYLOAD=false
      - ZIGBEE2MQTT_CONFIG_ADVANCED_LOG_LEVEL=warning
      - ZIGBEE2MQTT_CONFIG_AVAILABILITY_=true
      - ZIGBEE2MQTT_CONFIG_DEVICE_OPTIONS_LEGACY=false
      - ZIGBEE2MQTT_CONFIG_FRONTEND_PORT=8082
      - ZIGBEE2MQTT_CONFIG_FRONTEND_URL=https://z2m.oatel.net
      - ZIGBEE2MQTT_CONFIG_HOMEASSISTANT_ENABLED=true
      - ZIGBEE2MQTT_CONFIG_PERMIT_JOIN=false
      - ZIGBEE2MQTT_CONFIG_SERIAL_PORT=tcp://10.0.60.3:6638
      - ZIGBEE2MQTT_CONFIG_SERIAL_ADAPTER=zstack
    volumes:
      - ./data:/data
    networks:
      - caddy-net

networks:
  caddy-net:
    external: true
