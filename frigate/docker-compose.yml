services:
  frigate:
    image: ghcr.io/blakeblackshear/frigate:0.17.1
    container_name: frigate
    restart: unless-stopped
    privileged: true
    shm_size: 1500m
    environment:
      - TZ=Europe/Helsinki
    volumes:
      - ./config/config.yml:/config/config.yml
      - ./data:/data
      - /opt/media/frigate/media:/media
    devices:
      - /dev/bus/usb:/dev/bus/usb
    tmpfs:
      - /tmp/cache:size=512m
    ports:
      - "5000:5000"
      - "8554:8554"
    networks:
      - caddy-net
networks:
  caddy-net:
    external: true
